name: Validate Game Results

on:
  pull_request:
    paths:
      - '_games/**'
      - '.github/workflows/validate-games.yml'
      - '_tools/validate-game-results.py'
      - '_tools/requirements.txt'

  push:
    branches: ["main"]
    paths:
      - '_games/**'
      - '.github/workflows/validate-games.yml'
      - '_tools/validate-game-results.py'
      - '_tools/requirements.txt'

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'
          cache-dependency-path: '_tools/requirements.txt'

      - name: Install dependencies
        run: pip install -r _tools/requirements.txt

      - name: Run validation script
        run: python3 _tools/validate-game-results.py
